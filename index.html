<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Camera Phát</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #id-display { position: fixed; top: 20px; background: rgba(0,0,0,0.7); color: #0f0; padding: 15px; border-radius: 8px; font-size: 20px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <div id="id-display">Đang khởi tạo Camera...</div>

    <script>
        const peer = new Peer({
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', id => { document.getElementById('id-display').innerText = "ID: " + id; });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => {
                document.getElementById('v').srcObject = stream;
                peer.on('call', call => {
                    call.answer(stream);
                });
            })
            .catch(err => { alert("Lỗi Camera: " + err); });
    </script>
</body>
</html>
