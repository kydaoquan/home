<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Audio Sender</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        font-family: Arial;
    }

    #wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    iframe {
        width: 1px;
        height: 1px;
        border: 0;
        opacity: 0;
        pointer-events: none;
    }

    #status {
        color: white;
        font-size: 14px;
        opacity: 0.7;
    }

    button {
        padding: 12px 20px;
        border: 0;
        border-radius: 10px;
        background: #00aa66;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>

<body>

<div id="wrap">
    <button id="startBtn">Start Audio</button>
</div>

<script>
const btn = document.getElementById("startBtn");

btn.onclick = () => {

    btn.remove();

    const iframe = document.createElement("iframe");

    iframe.allow =
        "camera; microphone; autoplay; fullscreen; display-capture";

    iframe.src =
        "https://vdo.ninja/?push=mysound" +
        "&miconly" +
        "&proaudio" +
        "&stereo" +
        "&bitrate=320" +
        "&buffer=0" +
        "&autostart" +
        "&cleanoutput" +
        "&transparent" +
        "&hidehome";

    document.body.appendChild(iframe);

    const status = document.createElement("div");
    status.id = "status";
    status.innerText = "Audio Connected";
    document.getElementById("wrap").appendChild(status);
};
</script>

</body>
</html>
