<!DOCTYPE html>
<html>
<body>
    <video id="video" autoplay playsinline style="width:100%; height:auto; background:#000;"></video>

    <script>
        async function khoiChayCamera() {
            try {
                // Constraints để ưu tiên camera sau
                const constraints = {
                    video: { facingMode: "environment" } 
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;
            } catch (err) {
                console.error("Lỗi rồi mày ơi: ", err);
                alert("Không mở được camera: " + err.message);
            }
        }

        khoiChayCamera();
    </script>
</body>
</html>
