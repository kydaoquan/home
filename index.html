<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Camera Phát</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        video { width: 100%; height: 90vh; object-fit: cover; }
        #id-display { padding: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <div id="id-display">Đang kết nối server...</div>

    <script>
        // Cấu hình kết nối tới server ổn định
        const peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', id => { document.getElementById('id-display').innerText = "ID của mày: " + id; });

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
            .then(stream => {
                document.getElementById('v').srcObject = stream;
                peer.on('call', call => {
                    call.answer(stream);
                });
            })
            .catch(err => alert("Lỗi Camera: " + err));
    </script>
</body>
</html>
